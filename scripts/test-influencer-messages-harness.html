<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Influencer messages harness</title>
    <link rel="stylesheet" href="/influencer-dashboard-home.css?v=9" />
    <link rel="stylesheet" href="/business-dashboard-header.css?v=30" />
    <style>
      .flex.h-screen { display: flex; height: 100vh; }
      .flex.h-screen > .flex-1.flex.flex-col.min-w-0 { flex: 1; display: flex; flex-direction: column; min-height: 0; }
      main.flex-1 { flex: 1; min-height: 0; display: flex; flex-direction: column; }
    </style>
  </head>
  <body>
    <div class="flex h-screen">
      <aside>
        <nav>
          <button type="button" class="bg-violet-100" onclick="window.__setSection('home')">Dashboard</button>
          <button type="button" onclick="window.__setSection('messages')">Messages</button>
        </nav>
      </aside>
      <div class="flex-1 flex flex-col min-w-0 min-h-0 overflow-hidden">
        <header>
          <span class="text-sm font-semibold text-gray-800" id="crumb">Dashboard</span>
        </header>
        <main class="flex-1 min-h-0 overflow-hidden flex flex-col" id="main">
          <div id="influnet-influencer-dashboard-mount" class="w-full">
            <div data-infl-dashboard>Home dashboard content</div>
          </div>
        </main>
      </div>
    </div>
    <script>
      history.replaceState({}, "", "/dashboard/influencer");
      window.__setSection = function (id) {
        const main = document.getElementById("main");
        const crumb = document.getElementById("crumb");
        document.querySelectorAll("aside nav button").forEach((b) => {
          b.classList.remove("bg-violet-100");
        });
        if (id === "home") {
          crumb.textContent = "Dashboard";
          document.querySelectorAll("aside nav button").forEach((b, i) => {
            b.classList.toggle("bg-violet-100", i === 0);
          });
          if (window.influnetOnInfluencerSectionChange) {
            window.influnetOnInfluencerSectionChange("home");
          }
          main.innerHTML =
            '<div id="influnet-influencer-dashboard-mount" class="w-full"><div class="infl-idash" data-infl-dashboard>Home dashboard</div></div>';
        } else if (id === "messages") {
          crumb.textContent = "Messages";
          document.querySelectorAll("aside nav button").forEach((b, i) => {
            b.classList.toggle("bg-violet-100", i === 1);
          });
          if (window.influnetOnInfluencerSectionChange) {
            window.influnetOnInfluencerSectionChange("messages");
          }
          main.innerHTML =
            '<div class="influnet-react-messages-root flex flex-1 min-h-0 min-w-0 w-full"><h2>No messages yet</h2></div>';
        }
      };
    </script>
    <script src="/influencer-dashboard-home.js?v=17"></script>
  </body>
</html>
