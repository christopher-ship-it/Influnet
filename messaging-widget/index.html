<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Influnet Messenger — Dev</title>
    <style>
      body {
        margin: 0;
        font-family: Inter, system-ui, sans-serif;
        background: #f3f4f6;
      }
      /* Minimal sidebar shell for SidebarBadgeHost testing */
      .flex.h-screen {
        display: flex;
        height: 100vh;
      }
      aside {
        width: 220px;
        background: #fff;
        border-right: 1px solid #e5e7eb;
        padding: 1rem;
      }
      aside nav {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
      }
      aside nav button {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.65rem 0.75rem;
        border: 0;
        border-radius: 0.75rem;
        background: transparent;
        cursor: pointer;
        font-weight: 600;
        text-align: left;
      }
      main {
        flex: 1;
        padding: 2rem;
      }
    </style>
  </head>
  <body>
    <div class="flex h-screen">
      <aside>
        <nav>
          <button type="button">Dashboard</button>
          <button type="button">
            Messages
            <span class="bg-red-500 rounded-full min-w-[18px] h-[18px] text-white text-xs flex items-center justify-center">2</span>
          </button>
          <button type="button">
            Requests
            <span class="bg-red-500 rounded-full min-w-[18px] h-[18px] text-white text-xs flex items-center justify-center">1</span>
          </button>
        </nav>
      </aside>
      <main>
        <h1>Messaging widget dev</h1>
        <p>Open DevTools console for debug logs. Use the Messages launcher bottom-right.</p>
      </main>
    </div>
    <script>
      localStorage.setItem(
        "influnet_user",
        JSON.stringify({
          id: "00000000-0000-4000-8000-000000000001",
          name: "Dev User",
          role: "influencer",
        })
      );
      history.replaceState({}, "", "/dashboard/influencer");
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
