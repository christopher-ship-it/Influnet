<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 640" fill="none" role="img" aria-label="Creators and brands collaborating on Influnet">
  <defs>
    <style>
      .ce-float-a { animation: ce-fa 6s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
      .ce-float-b { animation: ce-fb 7s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
      .ce-float-c { animation: ce-fc 5.5s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
      .ce-float-d { animation: ce-fd 6.5s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
      @keyframes ce-fa { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
      @keyframes ce-fb { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
      @keyframes ce-fc { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
      @keyframes ce-fd { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
    </style>
    <linearGradient id="ce-pink" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ee3e96"/>
      <stop offset="100%" stop-color="#f26e59"/>
    </linearGradient>
    <linearGradient id="ce-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ee3e96" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#f26e59" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="ce-card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a1a24"/>
      <stop offset="100%" stop-color="#111116"/>
    </linearGradient>
    <filter id="ce-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="ce-shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- ambient glow -->
  <ellipse cx="360" cy="320" rx="280" ry="220" fill="url(#ce-bg)"/>
  <ellipse cx="180" cy="120" rx="90" ry="70" fill="#ee3e96" opacity="0.08"/>
  <ellipse cx="560" cy="500" rx="100" ry="80" fill="#f26e59" opacity="0.1"/>

  <!-- connection lines -->
  <g stroke="url(#ce-pink)" stroke-width="1.5" stroke-dasharray="6 6" opacity="0.35">
    <path d="M200 420 C280 360 340 300 400 260"/>
    <path d="M520 380 C460 340 420 300 400 260"/>
    <path d="M400 260 C400 200 400 160 400 120"/>
  </g>
  <circle cx="400" cy="260" r="6" fill="#ee3e96" opacity="0.6"/>
  <circle cx="200" cy="420" r="5" fill="#f26e59" opacity="0.5"/>
  <circle cx="520" cy="380" r="5" fill="#ee3e96" opacity="0.5"/>

  <!-- floating UI: Opportunities -->
  <g class="ce-float-a" filter="url(#ce-shadow)">
    <rect x="48" y="72" width="148" height="88" rx="14" fill="url(#ce-card)" stroke="#ffffff14"/>
    <rect x="64" y="88" width="56" height="8" rx="4" fill="#ee3e96" opacity="0.8"/>
    <rect x="64" y="104" width="100" height="6" rx="3" fill="#ffffff22"/>
    <rect x="64" y="118" width="80" height="6" rx="3" fill="#ffffff14"/>
    <circle cx="170" cy="132" r="14" fill="#ee3e9620" stroke="#ee3e96" stroke-width="1.2"/>
    <path d="M165 132 l4 4 8-8" stroke="#ee3e96" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- floating UI: Analytics -->
  <g class="ce-float-b" filter="url(#ce-shadow)">
    <rect x="540" y="56" width="156" height="96" rx="14" fill="url(#ce-card)" stroke="#ffffff14"/>
    <rect x="556" y="72" width="72" height="8" rx="4" fill="#f26e59" opacity="0.85"/>
    <rect x="556" y="108" width="18" height="28" rx="4" fill="#ee3e96" opacity="0.5"/>
    <rect x="580" y="98" width="18" height="38" rx="4" fill="#ee3e96" opacity="0.75"/>
    <rect x="604" y="88" width="18" height="48" rx="4" fill="url(#ce-pink)" opacity="0.9"/>
    <rect x="628" y="102" width="18" height="34" rx="4" fill="#f26e59" opacity="0.65"/>
    <polyline points="556,132 580,118 604,124 628,108 668,96" stroke="#f26e59" stroke-width="2" fill="none" opacity="0.7"/>
  </g>

  <!-- floating UI: Messages -->
  <g class="ce-float-c" filter="url(#ce-shadow)">
    <rect x="560" y="480" width="132" height="72" rx="14" fill="url(#ce-card)" stroke="#ffffff14"/>
    <rect x="576" y="496" width="48" height="8" rx="4" fill="#ee3e96" opacity="0.7"/>
    <rect x="576" y="514" width="96" height="6" rx="3" fill="#ffffff18"/>
    <rect x="576" y="528" width="72" height="6" rx="3" fill="#ffffff10"/>
  </g>

  <!-- floating UI: Campaigns -->
  <g class="ce-float-d" filter="url(#ce-shadow)">
    <rect x="40" y="480" width="140" height="80" rx="14" fill="url(#ce-card)" stroke="#ffffff14"/>
    <rect x="56" y="496" width="64" height="8" rx="4" fill="#f26e59" opacity="0.75"/>
    <rect x="56" y="514" width="108" height="5" rx="2.5" fill="#ffffff16"/>
    <rect x="56" y="526" width="88" height="5" rx="2.5" fill="#ffffff10"/>
    <rect x="56" y="540" width="108" height="6" rx="3" fill="#ffffff08"/>
    <rect x="56" y="540" width="72" height="6" rx="3" fill="url(#ce-pink)" opacity="0.85"/>
  </g>

  <!-- central dashboard -->
  <g filter="url(#ce-shadow)">
    <rect x="248" y="168" width="304" height="220" rx="20" fill="url(#ce-card)" stroke="#ffffff18"/>
    <rect x="264" y="184" width="120" height="10" rx="5" fill="url(#ce-pink)" opacity="0.9"/>
    <rect x="264" y="204" width="180" height="7" rx="3.5" fill="#ffffff18"/>
    <rect x="264" y="232" width="272" height="1" fill="#ffffff10"/>
    <rect x="264" y="248" width="80" height="56" rx="10" fill="#ee3e9618" stroke="#ee3e9640"/>
    <rect x="356" y="248" width="80" height="56" rx="10" fill="#f26e5918" stroke="#f26e5940"/>
    <rect x="448" y="248" width="80" height="56" rx="10" fill="#ffffff08" stroke="#ffffff14"/>
    <rect x="272" y="260" width="32" height="4" rx="2" fill="#ee3e96"/>
    <rect x="364" y="260" width="32" height="4" rx="2" fill="#f26e59"/>
    <rect x="456" y="260" width="32" height="4" rx="2" fill="#ffffff30"/>
    <rect x="264" y="320" width="272" height="48" rx="10" fill="#ffffff06" stroke="#ffffff10"/>
    <rect x="276" y="336" width="120" height="6" rx="3" fill="#ffffff20"/>
    <rect x="276" y="350" width="88" height="5" rx="2.5" fill="#ffffff12"/>
    <circle cx="508" cy="344" r="16" fill="url(#ce-pink)" opacity="0.85"/>
    <path d="M503 344 l4 4 8-8" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- creator figure (left) -->
  <g filter="url(#ce-shadow)">
    <ellipse cx="210" cy="500" rx="72" ry="16" fill="#000" opacity="0.25"/>
    <rect x="168" y="360" width="84" height="120" rx="28" fill="#1f1f2a" stroke="#ffffff12"/>
    <circle cx="210" cy="322" r="34" fill="#2a2438" stroke="#ffffff14"/>
    <circle cx="210" cy="318" r="28" fill="#3d3550"/>
    <rect x="196" y="392" width="28" height="36" rx="8" fill="url(#ce-pink)" opacity="0.25"/>
    <!-- phone -->
    <rect x="228" y="368" width="36" height="64" rx="8" fill="#111116" stroke="#ee3e96" stroke-width="1.5"/>
    <rect x="232" y="376" width="28" height="44" rx="4" fill="#ee3e9615"/>
    <circle cx="246" cy="426" r="3" fill="#ee3e96"/>
    <!-- ring light -->
    <ellipse cx="248" cy="350" rx="28" ry="8" fill="#ee3e96" opacity="0.15"/>
  </g>

  <!-- brand team (right) -->
  <g filter="url(#ce-shadow)">
    <ellipse cx="530" cy="510" rx="88" ry="16" fill="#000" opacity="0.22"/>
    <rect x="470" y="400" width="120" height="96" rx="16" fill="#1a1a24" stroke="#ffffff12"/>
    <rect x="486" y="416" width="88" height="8" rx="4" fill="#f26e59" opacity="0.7"/>
    <rect x="486" y="432" width="64" height="6" rx="3" fill="#ffffff16"/>
    <circle cx="500" cy="468" r="14" fill="#2a2438" stroke="#ffffff14"/>
    <circle cx="530" cy="468" r="14" fill="#2a2438" stroke="#ffffff14"/>
    <circle cx="560" cy="468" r="14" fill="#2a2438" stroke="#ffffff14"/>
    <rect x="486" y="488" width="88" height="6" rx="3" fill="#ffffff10"/>
    <!-- verified badge -->
    <circle cx="574" cy="404" r="16" fill="url(#ce-pink)" filter="url(#ce-glow)"/>
    <path d="M568 404 l5 5 10-10" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- social icons row -->
  <g opacity="0.55">
    <circle cx="320" cy="580" r="16" fill="#ffffff08" stroke="#ffffff14"/>
    <rect x="312" y="574" width="16" height="12" rx="3" fill="none" stroke="#ee3e96" stroke-width="1.2"/>
    <circle cx="360" cy="580" r="16" fill="#ffffff08" stroke="#ffffff14"/>
    <path d="M352 586 c0-4 3-7 8-7 s8 3 8 7" stroke="#f26e59" stroke-width="1.2" fill="none"/>
    <circle cx="400" cy="580" r="16" fill="#ffffff08" stroke="#ffffff14"/>
    <path d="M392 582 h16 M400 574 v16" stroke="#ee3e96" stroke-width="1.2"/>
    <circle cx="440" cy="580" r="16" fill="#ffffff08" stroke="#ffffff14"/>
    <path d="M432 586 l8-8 8 8" stroke="#f26e59" stroke-width="1.2" fill="none"/>
  </g>
</svg>
