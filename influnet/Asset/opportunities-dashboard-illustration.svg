<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 620" fill="none" role="img" aria-label="Collaboration opportunities from Instagram, WhatsApp, and email flowing into the Influnet dashboard">
  <defs>
    <style>
      .op-float-a { animation: op-fa 5.5s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
      .op-float-b { animation: op-fb 6.5s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
      .op-float-c { animation: op-fc 5s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
      .op-float-d { animation: op-fd 7s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
      .op-float-e { animation: op-fe 6s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
      @keyframes op-fa { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-9px)} }
      @keyframes op-fb { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
      @keyframes op-fc { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-7px)} }
      @keyframes op-fd { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
      @keyframes op-fe { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
    </style>
    <linearGradient id="op-pink" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ee3e96"/>
      <stop offset="100%" stop-color="#f26e59"/>
    </linearGradient>
    <linearGradient id="op-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ee3e96" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#f26e59" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="op-card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a1a24"/>
      <stop offset="100%" stop-color="#111116"/>
    </linearGradient>
    <filter id="op-shadow" x="-12%" y="-12%" width="124%" height="130%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <ellipse cx="380" cy="310" rx="300" ry="240" fill="url(#op-bg)"/>

  <!-- scattered "before" notifications (left) -->
  <g class="op-float-a" filter="url(#op-shadow)">
    <rect x="36" y="88" width="118" height="64" rx="12" fill="url(#op-card)" stroke="#ffffff14"/>
    <circle cx="58" cy="110" r="12" fill="#ee3e9625" stroke="#ee3e96" stroke-width="1.2"/>
    <rect x="44" y="104" width="8" height="8" rx="2" fill="none" stroke="#ee3e96" stroke-width="1.2"/>
    <circle cx="52" cy="112" r="2.5" fill="#ee3e96"/>
    <rect x="76" y="104" width="62" height="6" rx="3" fill="#ffffff22"/>
    <rect x="76" y="116" width="48" height="5" rx="2.5" fill="#ffffff12"/>
    <circle cx="138" cy="96" r="10" fill="#ee3e96"/>
    <text x="135" y="100" text-anchor="middle" fill="#fff" font-size="9" font-weight="700">3</text>
  </g>

  <g class="op-float-b" filter="url(#op-shadow)">
    <rect x="24" y="200" width="108" height="58" rx="12" fill="url(#op-card)" stroke="#ffffff14"/>
    <circle cx="46" cy="222" r="12" fill="#25D36625" stroke="#25D366" stroke-width="1.2"/>
    <path d="M40 226 c2-3 6-3 8 0 l2 2" stroke="#25D366" stroke-width="1.2" fill="none"/>
    <rect x="64" y="216" width="52" height="5" rx="2.5" fill="#ffffff18"/>
    <rect x="64" y="226" width="40" height="5" rx="2.5" fill="#ffffff10"/>
  </g>

  <g class="op-float-c" filter="url(#op-shadow)">
    <rect x="52" y="300" width="112" height="58" rx="12" fill="url(#op-card)" stroke="#ffffff14"/>
    <circle cx="74" cy="322" r="12" fill="#f26e5925" stroke="#f26e59" stroke-width="1.2"/>
    <rect x="66" y="318" width="16" height="10" rx="2" fill="none" stroke="#f26e59" stroke-width="1.2"/>
    <rect x="92" y="316" width="56" height="5" rx="2.5" fill="#ffffff18"/>
    <rect x="92" y="326" width="44" height="5" rx="2.5" fill="#ffffff10"/>
  </g>

  <g class="op-float-d" filter="url(#op-shadow)">
    <rect x="28" y="400" width="124" height="64" rx="12" fill="url(#op-card)" stroke="#ffffff14"/>
    <circle cx="50" cy="422" r="12" fill="#ee3e9620" stroke="#ee3e96" stroke-width="1.2"/>
    <path d="M44 422 h12 M50 416 v12" stroke="#ee3e96" stroke-width="1.2"/>
    <rect x="68" y="414" width="68" height="5" rx="2.5" fill="#ffffff20"/>
    <rect x="68" y="424" width="52" height="5" rx="2.5" fill="#ffffff12"/>
    <rect x="68" y="438" width="36" height="14" rx="7" fill="url(#op-pink)" opacity="0.85"/>
  </g>

  <!-- flow lines into center -->
  <g stroke="url(#op-pink)" stroke-width="1.5" opacity="0.35" fill="none" stroke-dasharray="5 5">
    <path d="M140 120 C220 140 260 180 300 220"/>
    <path d="M120 230 C200 240 250 250 300 270"/>
    <path d="M150 330 C220 320 260 300 300 290"/>
    <path d="M140 430 C210 400 260 360 300 320"/>
  </g>

  <!-- smartphone -->
  <g filter="url(#op-shadow)">
    <rect x="278" y="168" width="104" height="196" rx="18" fill="#0d0d12" stroke="#ffffff18" stroke-width="1.5"/>
    <rect x="286" y="184" width="88" height="156" rx="8" fill="#111116"/>
    <rect x="314" y="176" width="32" height="5" rx="2.5" fill="#ffffff20"/>
    <rect x="294" y="198" width="72" height="6" rx="3" fill="url(#op-pink)" opacity="0.9"/>
    <rect x="294" y="212" width="56" height="4" rx="2" fill="#ffffff16"/>
    <rect x="294" y="228" width="72" height="28" rx="8" fill="#ffffff08" stroke="#ffffff10"/>
    <rect x="300" y="236" width="40" height="4" rx="2" fill="#ee3e96" opacity="0.7"/>
    <rect x="300" y="244" width="56" height="3" rx="1.5" fill="#ffffff12"/>
    <rect x="294" y="264" width="72" height="28" rx="8" fill="#ffffff08" stroke="#ffffff10"/>
    <rect x="300" y="272" width="48" height="4" rx="2" fill="#f26e59" opacity="0.7"/>
    <rect x="294" y="300" width="72" height="28" rx="8" fill="#ffffff08" stroke="#ffffff10"/>
    <circle cx="330" cy="314" r="8" fill="#ee3e9625" stroke="#ee3e96"/>
  </g>

  <!-- flow lines to dashboard -->
  <g stroke="url(#op-pink)" stroke-width="2" opacity="0.45" fill="none">
    <path d="M382 280 C440 280 480 260 520 240"/>
    <path d="M382 300 C450 310 490 330 520 350"/>
  </g>

  <!-- Influnet dashboard (right) -->
  <g filter="url(#op-shadow)">
    <rect x="420" y="120" width="300" height="380" rx="20" fill="url(#op-card)" stroke="#ffffff18"/>
    <rect x="436" y="136" width="120" height="12" rx="6" fill="url(#op-pink)"/>
    <text x="448" y="145" fill="#fff" font-size="11" font-weight="700" font-family="Inter,system-ui,sans-serif">Influnet</text>
    <rect x="568" y="138" width="56" height="8" rx="4" fill="#ffffff12"/>
    <rect x="632" y="138" width="72" height="8" rx="4" fill="#ffffff08"/>

    <!-- opportunity card -->
    <g class="op-float-e">
      <rect x="436" y="168" width="268" height="72" rx="12" fill="#ffffff06" stroke="#ee3e9640"/>
      <rect x="452" y="184" width="80" height="7" rx="3.5" fill="#ee3e96" opacity="0.85"/>
      <rect x="452" y="198" width="140" height="5" rx="2.5" fill="#ffffff18"/>
      <rect x="452" y="210" width="100" height="5" rx="2.5" fill="#ffffff10"/>
      <circle cx="680" cy="204" r="14" fill="url(#op-pink)" opacity="0.9"/>
      <path d="M675 204 l4 4 8-8" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/>
    </g>

    <!-- campaign card -->
    <rect x="436" y="252" width="268" height="64" rx="12" fill="#ffffff06" stroke="#ffffff12"/>
    <rect x="452" y="268" width="72" height="7" rx="3.5" fill="#f26e59" opacity="0.8"/>
    <rect x="452" y="282" width="120" height="5" rx="2.5" fill="#ffffff14"/>
    <rect x="452" y="294" width="180" height="6" rx="3" fill="#ffffff08"/>
    <rect x="452" y="294" width="120" height="6" rx="3" fill="url(#op-pink)" opacity="0.75"/>

    <!-- messages -->
    <rect x="436" y="328" width="128" height="72" rx="12" fill="#ffffff06" stroke="#ffffff12"/>
    <rect x="452" y="344" width="56" height="7" rx="3.5" fill="#ee3e96" opacity="0.7"/>
    <rect x="452" y="358" width="96" height="5" rx="2.5" fill="#ffffff12"/>
    <rect x="452" y="370" width="72" height="5" rx="2.5" fill="#ffffff08"/>

    <!-- analytics widget -->
    <rect x="576" y="328" width="128" height="72" rx="12" fill="#ffffff06" stroke="#ffffff12"/>
    <rect x="592" y="344" width="48" height="7" rx="3.5" fill="#f26e59" opacity="0.75"/>
    <rect x="592" y="368" width="14" height="24" rx="3" fill="#ee3e96" opacity="0.45"/>
    <rect x="612" y="360" width="14" height="32" rx="3" fill="#ee3e96" opacity="0.7"/>
    <rect x="632" y="352" width="14" height="40" rx="3" fill="url(#op-pink)" opacity="0.9"/>
    <rect x="652" y="364" width="14" height="28" rx="3" fill="#f26e59" opacity="0.6"/>

    <!-- brand request row -->
    <rect x="436" y="412" width="268" height="72" rx="12" fill="#ffffff06" stroke="#ffffff12"/>
    <circle cx="460" cy="448" r="16" fill="#2a2438" stroke="#ffffff14"/>
    <rect x="484" y="432" width="100" height="7" rx="3.5" fill="#ffffff20"/>
    <rect x="484" y="446" width="72" height="5" rx="2.5" fill="#ffffff12"/>
    <rect x="484" y="460" width="88" height="14" rx="7" fill="#ee3e9620" stroke="#ee3e96" stroke-width="1"/>
    <text x="528" y="470" text-anchor="middle" fill="#ee3e96" font-size="8" font-weight="700" font-family="Inter,system-ui,sans-serif">Verified</text>
  </g>

  <!-- floating platform icons -->
  <g class="op-float-a">
    <circle cx="168" cy="148" r="22" fill="#111116" stroke="#ee3e96" stroke-width="1.5"/>
    <rect x="158" y="140" width="20" height="16" rx="4" fill="none" stroke="#ee3e96" stroke-width="1.3"/>
    <circle cx="174" cy="152" r="3" fill="#ee3e96"/>
  </g>
  <g class="op-float-b">
    <circle cx="188" cy="268" r="22" fill="#111116" stroke="#25D366" stroke-width="1.5"/>
    <path d="M178 272 c0-6 8-6 8 0 v4 h-8z" fill="none" stroke="#25D366" stroke-width="1.2"/>
  </g>
  <g class="op-float-c">
    <circle cx="176" cy="368" r="22" fill="#111116" stroke="#f26e59" stroke-width="1.5"/>
    <rect x="166" y="360" width="20" height="14" rx="2" fill="none" stroke="#f26e59" stroke-width="1.2"/>
    <path d="M166 364 h20" stroke="#f26e59" stroke-width="1"/>
  </g>

  <!-- label chips -->
  <rect x="88" y="520" width="110" height="28" rx="14" fill="#ffffff08" stroke="#ffffff14"/>
  <text x="143" y="538" text-anchor="middle" fill="#9ca3af" font-size="10" font-weight="600" font-family="Inter,system-ui,sans-serif">Before Influnet</text>
  <rect x="562" y="520" width="110" height="28" rx="14" fill="url(#op-pink)" opacity="0.15" stroke="#ee3e9640"/>
  <text x="617" y="538" text-anchor="middle" fill="#ee3e96" font-size="10" font-weight="700" font-family="Inter,system-ui,sans-serif">With Influnet</text>
</svg>
