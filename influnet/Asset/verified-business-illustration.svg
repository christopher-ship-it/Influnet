<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 640" fill="none" role="img" aria-label="Business verification flow on Influnet — from profile review to trusted collaboration">
  <defs>
    <style>
      .vb-float-a { animation: vb-fa 6s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
      .vb-float-b { animation: vb-fb 5.5s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
      .vb-float-c { animation: vb-fc 7s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
      .vb-float-d { animation: vb-fd 6.5s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
      .vb-pulse { animation: vb-pulse 2.4s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
      .vb-line { animation: vb-dash 3s linear infinite; }
      @keyframes vb-fa { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-9px)} }
      @keyframes vb-fb { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-11px)} }
      @keyframes vb-fc { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-7px)} }
      @keyframes vb-fd { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
      @keyframes vb-pulse { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.06);opacity:0.92} }
      @keyframes vb-dash { to { stroke-dashoffset: -24; } }
    </style>
    <linearGradient id="vb-pink" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ee3e96"/>
      <stop offset="100%" stop-color="#f26e59"/>
    </linearGradient>
    <linearGradient id="vb-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ee3e96" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#f26e59" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="vb-card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a1a24"/>
      <stop offset="100%" stop-color="#111116"/>
    </linearGradient>
    <filter id="vb-shadow" x="-12%" y="-12%" width="124%" height="130%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <filter id="vb-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <ellipse cx="380" cy="320" rx="310" ry="250" fill="url(#vb-bg)"/>

  <!-- filtered spam profile (faded, rejected) -->
  <g opacity="0.35" transform="translate(48, 88) rotate(-6)">
    <rect width="100" height="72" rx="12" fill="#1a1a24" stroke="#ef444440" stroke-dasharray="4 4"/>
    <circle cx="28" cy="28" r="14" fill="#2a2438" stroke="#ef444450"/>
    <rect x="50" y="18" width="40" height="6" rx="3" fill="#ffffff12"/>
    <rect x="50" y="30" width="28" height="5" rx="2.5" fill="#ffffff08"/>
    <circle cx="82" cy="16" r="10" fill="#ef444420" stroke="#ef4444"/>
    <path d="M78 16 l3 3 6-6" stroke="#ef4444" stroke-width="1.5" stroke-linecap="round" transform="rotate(45 82 16)"/>
    <text x="50" y="58" fill="#ef4444" font-size="8" font-weight="700" font-family="Inter,system-ui,sans-serif">Filtered</text>
  </g>

  <!-- Step 1: business profiles entering -->
  <g class="vb-float-a" filter="url(#vb-shadow)">
    <rect x="56" y="200" width="128" height="88" rx="14" fill="url(#vb-card)" stroke="#ffffff14"/>
    <circle cx="88" cy="232" r="18" fill="#2a2438" stroke="#ffffff14"/>
    <rect x="68" y="224" width="40" height="16" rx="4" fill="#ffffff10"/>
    <rect x="114" y="224" width="56" height="7" rx="3.5" fill="#ffffff20"/>
    <rect x="114" y="236" width="40" height="5" rx="2.5" fill="#ffffff12"/>
    <rect x="72" y="258" width="48" height="16" rx="8" fill="#ffffff08" stroke="#ffffff10"/>
    <text x="96" y="269" text-anchor="middle" fill="#9ca3af" font-size="8" font-weight="600" font-family="Inter,system-ui,sans-serif">Brand</text>
    <text x="72" y="196" fill="#9ca3af" font-size="9" font-weight="700" font-family="Inter,system-ui,sans-serif">1 · Profile</text>
  </g>

  <!-- flow line 1 → shield -->
  <path class="vb-line" d="M184 244 C240 244 270 260 300 280" stroke="url(#vb-pink)" stroke-width="1.5" stroke-dasharray="6 6" opacity="0.4" fill="none"/>

  <!-- Step 2: verification shield / Influnet validates -->
  <g filter="url(#vb-shadow)">
    <rect x="268" y="220" width="168" height="148" rx="18" fill="url(#vb-card)" stroke="#ffffff18"/>
    <text x="284" y="244" fill="#ee3e96" font-size="10" font-weight="700" font-family="Inter,system-ui,sans-serif">2 · Influnet Validates</text>
    <rect x="284" y="254" width="136" height="6" rx="3" fill="#ffffff12"/>
    <rect x="284" y="268" width="100" height="5" rx="2.5" fill="#ffffff08"/>
    <!-- shield -->
    <g class="vb-pulse" filter="url(#vb-glow)">
      <path d="M352 310 l-36-14 v-22 c0-16 16-26 36-30 20 4 36 14 36 30 v22z" fill="url(#vb-pink)" opacity="0.2" stroke="url(#vb-pink)" stroke-width="2"/>
      <path d="M340 296 l8 8 16-16" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <rect x="284" y="340" width="80" height="5" rx="2.5" fill="#22c55e" opacity="0.6"/>
    <rect x="284" y="352" width="104" height="5" rx="2.5" fill="#22c55e" opacity="0.4"/>
  </g>

  <!-- flow line shield → verified -->
  <path class="vb-line" d="M436 294 C490 294 520 280 548 250" stroke="url(#vb-pink)" stroke-width="1.5" stroke-dasharray="6 6" opacity="0.4" fill="none"/>

  <!-- Step 3: verified business badge -->
  <g class="vb-float-b" filter="url(#vb-shadow)">
    <rect x="520" y="168" width="148" height="100" rx="14" fill="url(#vb-card)" stroke="#ee3e9640"/>
    <text x="536" y="192" fill="#ee3e96" font-size="9" font-weight="700" font-family="Inter,system-ui,sans-serif">3 · Verified</text>
    <circle cx="560" cy="224" r="20" fill="#2a2438" stroke="#ffffff14"/>
    <rect x="548" y="214" width="24" height="20" rx="3" fill="#ffffff10"/>
    <rect x="588" y="216" width="64" height="7" rx="3.5" fill="#ffffff22"/>
    <rect x="588" y="228" width="48" height="5" rx="2.5" fill="#ffffff12"/>
    <g class="vb-pulse">
      <circle cx="648" cy="188" r="18" fill="url(#vb-pink)" filter="url(#vb-glow)"/>
      <path d="M642 188 l5 5 10-10" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <rect x="536" y="248" width="116" height="8" rx="4" fill="#22c55e" opacity="0.25"/>
    <text x="594" y="255" text-anchor="middle" fill="#22c55e" font-size="8" font-weight="700" font-family="Inter,system-ui,sans-serif">✓ Verified Business</text>
  </g>

  <!-- Step 4: influencer + partnership -->
  <g class="vb-float-c" filter="url(#vb-shadow)">
    <rect x="480" y="400" width="220" height="120" rx="16" fill="url(#vb-card)" stroke="#ffffff14"/>
    <text x="496" y="424" fill="#f26e59" font-size="9" font-weight="700" font-family="Inter,system-ui,sans-serif">4 · Collaborate</text>
    <!-- influencer -->
    <circle cx="536" cy="468" r="22" fill="#2a2438" stroke="#ffffff14"/>
    <rect x="524" y="456" width="24" height="24" rx="6" fill="#ee3e9620"/>
    <!-- brand -->
    <circle cx="624" cy="468" r="22" fill="#2a2438" stroke="#ffffff14"/>
    <rect x="612" y="458" width="24" height="16" rx="3" fill="#f26e5920"/>
    <!-- handshake connection -->
    <path d="M558 468 h52" stroke="url(#vb-pink)" stroke-width="2" stroke-dasharray="4 4" class="vb-line"/>
    <circle cx="584" cy="468" r="14" fill="url(#vb-pink)" opacity="0.85"/>
    <path d="M578 468 c4-4 8 4 6 0 c-2-4 6-4 6 0" stroke="#fff" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <rect x="496" y="492" width="188" height="16" rx="8" fill="#ffffff06" stroke="#ffffff10"/>
    <text x="590" y="503" text-anchor="middle" fill="#d1d5db" font-size="8" font-weight="600" font-family="Inter,system-ui,sans-serif">Secure Collaboration</text>
  </g>

  <!-- opportunity card -->
  <g class="vb-float-d" filter="url(#vb-shadow)">
    <rect x="56" y="420" width="148" height="80" rx="14" fill="url(#vb-card)" stroke="#22c55e30"/>
    <rect x="72" y="436" width="72" height="7" rx="3.5" fill="#22c55e" opacity="0.75"/>
    <rect x="72" y="450" width="100" height="5" rx="2.5" fill="#ffffff14"/>
    <rect x="72" y="462" width="80" height="5" rx="2.5" fill="#ffffff08"/>
    <circle cx="176" cy="444" r="12" fill="#22c55e25" stroke="#22c55e"/>
    <path d="M171 444 l4 4 8-8" stroke="#22c55e" stroke-width="1.8" stroke-linecap="round"/>
  </g>

  <!-- floating trust labels -->
  <g class="vb-float-a">
    <rect x="200" y="56" width="130" height="28" rx="14" fill="#111116" stroke="#22c55e40"/>
    <text x="265" y="74" text-anchor="middle" fill="#22c55e" font-size="9" font-weight="700" font-family="Inter,system-ui,sans-serif">✓ Trusted Opportunity</text>
  </g>
  <g class="vb-float-b">
    <rect x="420" y="72" width="128" height="28" rx="14" fill="#111116" stroke="#ee3e9640"/>
    <text x="484" y="90" text-anchor="middle" fill="#ee3e96" font-size="9" font-weight="700" font-family="Inter,system-ui,sans-serif">✓ Authentic Brand</text>
  </g>
  <g class="vb-float-c">
    <rect x="280" y="520" width="140" height="28" rx="14" fill="url(#vb-pink)" opacity="0.12" stroke="#ee3e9650"/>
    <text x="350" y="538" text-anchor="middle" fill="#ee3e96" font-size="9" font-weight="700" font-family="Inter,system-ui,sans-serif">✓ Secure Collaboration</text>
  </g>

  <!-- brand logo placeholders row -->
  <g opacity="0.5">
    <rect x="200" y="360" width="36" height="36" rx="8" fill="#ffffff08" stroke="#ffffff12"/>
    <rect x="244" y="360" width="36" height="36" rx="8" fill="#ffffff08" stroke="#ffffff12"/>
    <rect x="288" y="360" width="36" height="36" rx="8" fill="#ffffff08" stroke="#ffffff12"/>
    <rect x="212" y="372" width="12" height="12" rx="2" fill="#ee3e96" opacity="0.4"/>
    <rect x="256" y="372" width="12" height="12" rx="2" fill="#f26e59" opacity="0.4"/>
    <rect x="300" y="372" width="12" height="12" rx="2" fill="#ee3e96" opacity="0.4"/>
  </g>
</svg>
