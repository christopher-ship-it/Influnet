<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 480" fill="none" role="img" aria-label="Professional creator profile on Influnet">
  <defs>
    <linearGradient id="fi-pink" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ee3e96"/>
      <stop offset="100%" stop-color="#f26e59"/>
    </linearGradient>
    <linearGradient id="fi-card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a1a24"/>
      <stop offset="100%" stop-color="#111116"/>
    </linearGradient>
  </defs>
  <rect width="560" height="480" rx="20" fill="#111116" stroke="#ffffff12"/>
  <!-- profile header -->
  <circle cx="120" cy="108" r="40" fill="#2a2438" stroke="#ffffff14"/>
  <rect x="176" y="84" width="160" height="10" rx="5" fill="#ffffff22"/>
  <rect x="176" y="102" width="120" height="7" rx="3.5" fill="#ffffff14"/>
  <rect x="176" y="118" width="88" height="20" rx="10" fill="url(#fi-pink)" opacity="0.2" stroke="#ee3e9640"/>
  <text x="220" y="132" text-anchor="middle" fill="#ee3e96" font-size="9" font-weight="700" font-family="Inter,system-ui,sans-serif">Creator</text>
  <!-- social accounts -->
  <rect x="24" y="168" width="512" height="56" rx="12" fill="url(#fi-card)" stroke="#ffffff10"/>
  <text x="40" y="188" fill="#9ca3af" font-size="9" font-weight="600" font-family="Inter,system-ui,sans-serif">Social</text>
  <circle cx="88" cy="200" r="14" fill="#ee3e9620" stroke="#ee3e96"/>
  <circle cx="128" cy="200" r="14" fill="#f26e5920" stroke="#f26e59"/>
  <circle cx="168" cy="200" r="14" fill="#ffffff08" stroke="#ffffff20"/>
  <circle cx="208" cy="200" r="14" fill="#ffffff08" stroke="#ffffff20"/>
  <!-- portfolio -->
  <rect x="24" y="240" width="248" height="120" rx="12" fill="url(#fi-card)" stroke="#ffffff10"/>
  <rect x="40" y="256" width="80" height="7" rx="3.5" fill="#ee3e96" opacity="0.8"/>
  <rect x="40" y="272" width="216" height="64" rx="8" fill="#ffffff06" stroke="#ffffff08"/>
  <rect x="48" y="284" width="64" height="40" rx="6" fill="#ee3e9615"/>
  <rect x="120" y="284" width="64" height="40" rx="6" fill="#f26e5915"/>
  <rect x="192" y="284" width="56" height="40" rx="6" fill="#ffffff08"/>
  <!-- niches -->
  <rect x="288" y="240" width="248" height="120" rx="12" fill="url(#fi-card)" stroke="#ffffff10"/>
  <rect x="304" y="256" width="72" height="7" rx="3.5" fill="#f26e59" opacity="0.75"/>
  <rect x="304" y="276" width="56" height="18" rx="9" fill="#ee3e9620" stroke="#ee3e9640"/>
  <rect x="368" y="276" width="56" height="18" rx="9" fill="#ffffff08" stroke="#ffffff12"/>
  <rect x="432" y="276" width="88" height="18" rx="9" fill="#ffffff08" stroke="#ffffff12"/>
  <text x="332" y="289" text-anchor="middle" fill="#ee3e96" font-size="8" font-weight="600" font-family="Inter,system-ui,sans-serif">Fashion</text>
  <text x="396" y="289" text-anchor="middle" fill="#9ca3af" font-size="8" font-weight="600" font-family="Inter,system-ui,sans-serif">Travel</text>
  <text x="476" y="289" text-anchor="middle" fill="#9ca3af" font-size="8" font-weight="600" font-family="Inter,system-ui,sans-serif">Lifestyle</text>
  <!-- contact + visibility -->
  <rect x="24" y="376" width="248" height="80" rx="12" fill="url(#fi-card)" stroke="#ffffff10"/>
  <rect x="40" y="392" width="96" height="7" rx="3.5" fill="#ee3e96" opacity="0.7"/>
  <rect x="40" y="408" width="180" height="5" rx="2.5" fill="#ffffff12"/>
  <rect x="40" y="420" width="120" height="5" rx="2.5" fill="#ffffff08"/>
  <rect x="40" y="432" width="72" height="16" rx="8" fill="url(#fi-pink)" opacity="0.85"/>
  <text x="76" y="443" text-anchor="middle" fill="#fff" font-size="8" font-weight="700" font-family="Inter,system-ui,sans-serif">Contact</text>
  <rect x="288" y="376" width="248" height="80" rx="12" fill="url(#fi-card)" stroke="#22c55e30"/>
  <rect x="304" y="392" width="120" height="7" rx="3.5" fill="#22c55e" opacity="0.75"/>
  <text x="412" y="428" text-anchor="middle" fill="#22c55e" font-size="10" font-weight="700" font-family="Inter,system-ui,sans-serif">Visible to brands</text>
  <path d="M460 408 l8 8 16-16" stroke="#22c55e" stroke-width="2" stroke-linecap="round"/>
</svg>
